<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuroRead AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="glass-container">
    <header>
      <h1>NeuroRead AI</h1>
      <div id="cam-badge" class="badge">CAM: --</div>
    </header>

    <div class="profile-grid">
      <div class="profile-card" data-profile="adhd">
        <h3>ADHD</h3>
        <p>High contrast</p>
      </div>
      <div class="profile-card" data-profile="autism">
        <h3>Autism</h3>
        <p>Low noise</p>
      </div>
      <div class="profile-card" data-profile="dyslexia">
        <h3>Dyslexia</h3>
        <p>OpenDyslexic</p>
      </div>
      <div class="profile-card" data-profile="custom">
        <h3>Custom</h3>
        <p>Build your own</p>
      </div>
    </div>

    <!-- Dynamic Toggles Menu -->
    <div class="feature-menu" id="feature-menu">
      <label class="toggle-row">
        <span>Focus Mode</span>
        <input type="checkbox" id="toggle-focusMode">
        <div class="slider"></div>
      </label>
      <label class="toggle-row">
        <span>Reading Ruler</span>
        <input type="checkbox" id="toggle-readingRuler">
        <div class="slider"></div>
      </label>
      <label class="toggle-row">
        <span>ADHD Colors</span>
        <input type="checkbox" id="toggle-adhdColours">
        <div class="slider"></div>
      </label>
      <label class="toggle-row">
        <span>Voice Commands 🎙️</span>
        <input type="checkbox" id="toggle-voiceCommands">
        <div class="slider"></div>
      </label>
      <label class="toggle-row">
        <span style="color:#A78BFA">Play Text (TTS)</span>
        <button id="btn-tts-play">▶ Play</button>
      </label>
    </div>

    <div class="actions">
      <button id="btn-deactivate" class="btn-secondary">Deactivate</button>
      <button id="btn-activate" class="btn-primary">✨ Activate</button>
    </div>

    <div id="status-bar" class="status-bar">Select a profile to begin</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

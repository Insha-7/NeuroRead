<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuroRead AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #e2e8f0;
      padding: 20px;
    }
    h2 { font-size: 18px; margin-bottom: 14px; color: #a78bfa; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    #btn-activate { background: #7c3aed; color: #fff; }
    #btn-deactivate { background: #333; color: #aaa; }
    .btn-focus { background: #ea580c; color: #fff; }
    .btn-focus-off { background: #333; color: #aaa; }
    #status { margin-top: 10px; font-size: 12px; color: #64748b; text-align: center; }
  </style>
</head>
<body>
  <h2>NeuroRead AI</h2>
  <button class="btn" id="btn-activate">1. Format Text</button>
  <button class="btn" id="btn-deactivate">1. Undo Format</button>
  <button class="btn btn-focus" id="btn-focus">2. Block Ads & Autoplay</button>
  <button class="btn btn-focus-off" id="btn-focus-off">2. Unblock Ads</button>
  <button class="btn" id="btn-simplify" style="background: #059669;">3. Simplify Text (AI)</button>
  <button class="btn" id="btn-simplify-off" style="background: #333; color: #aaa;">3. Undo Simplify</button>
  <div id="status">NeuroRead is Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
